<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>magpie · settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Public+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">
      <svg viewBox="0 0 200 120" aria-hidden="true">
        <defs>
          <linearGradient id="wing2" x1="0" y1="0" x2="1" y2="0.6">
            <stop offset="0" stop-color="#2fbf9b"/>
            <stop offset="0.55" stop-color="#48c9d6"/>
            <stop offset="1" stop-color="#8a5cf2"/>
          </linearGradient>
        </defs>
        <path d="M118,60 Q170,45 194,55 Q168,62 130,70 Z" fill="#0f0c14"/>
        <ellipse cx="88" cy="62" rx="38" ry="18" fill="#0f0c14"/>
        <ellipse cx="80" cy="70" rx="22" ry="9" fill="#f0ecf5" opacity="0.92"/>
        <path d="M92,50 Q110,40 124,58 Q110,66 88,62 Z" fill="url(#wing2)"/>
        <circle cx="52" cy="52" r="14" fill="#0f0c14"/>
        <path d="M40,52 L24,48 L40,58 Z" fill="#0f0c14"/>
        <circle cx="50" cy="49" r="2" fill="#f0ecf5"/>
      </svg>
      <span class="nav-brand-word">mag<em>pie</em></span>
    </a>
    <div class="nav-group">
      <a class="nav-link" href="/">Tag</a>
      <a class="nav-link active" href="/settings">Settings</a>
    </div>
    <div class="nav-system">
      <a class="nav-link" href="https://github.com/abhichandra21/magpie" target="_blank" rel="noopener">GitHub</a>
    </div>
  </nav>

  <main>
    <div class="settings-head">
      <h1>Settings</h1>
      <p>Edit the basics of your <span class="path mono" id="cfg-path">~/.config/magpie/config.toml</span>. The prompt template stays untouched.</p>
    </div>

    <form id="cfg-form" autocomplete="off">
      <div class="settings-card">
        <h3>Defaults <span class="kind">global</span></h3>
        <div class="settings-grid">
          <label>
            <span>Default endpoint</span>
            <select class="input-field" id="default_endpoint"></select>
          </label>
          <label>
            <span>Max keywords</span>
            <input class="input-field" id="max_keywords" type="number" min="1" max="200" required>
          </label>
          <label>
            <span>Concurrency</span>
            <input class="input-field" id="concurrency" type="number" min="1" max="32" required>
          </label>
        </div>
      </div>

      <div class="settings-card">
        <h3>Endpoints <span class="kind">openai-compatible</span></h3>
        <div id="endpoints"></div>
        <button type="button" class="btn-ghost" id="add-ep" style="margin-top:0.6rem;">+ add endpoint</button>
      </div>

      <div class="settings-actions">
        <button type="submit" class="btn-primary" id="save">Save</button>
        <button type="button" class="btn-ghost" id="reload">Reload</button>
        <span class="settings-status" id="status"></span>
      </div>
    </form>
  </main>

  <footer>
    <span class="mono">Pica pica · local-only</span>
    <span class="sep">·</span>
    <a href="/" class="mono" style="color:var(--muted); text-decoration:none;">back to tag</a>
  </footer>

  <template id="ep-row">
    <div class="endpoint-row">
      <label>
        <span>Name</span>
        <input class="input-field name" type="text" placeholder="mac" required>
      </label>
      <label>
        <span>URL</span>
        <input class="input-field url" type="text" placeholder="http://localhost:11434/v1" required>
      </label>
      <label>
        <span>Model</span>
        <input class="input-field model" type="text" placeholder="gemma4:26b-a4b-it-q4_K_M" required>
      </label>
      <label>
        <span>API key <i style="color:var(--muted); font-style:italic;">— if needed</i></span>
        <input class="input-field api_key" type="password" placeholder="leave blank for none">
      </label>
      <button type="button" class="rm">remove</button>
    </div>
  </template>

  <script src="/static/settings.js" type="module"></script>
</body>
</html>
